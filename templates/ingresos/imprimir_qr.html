<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imprimir QR - Equipo {{ ingreso.codigo_equipo }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 18px;
            background: #f9f9f9;
        }
        .page {
            background: white;
            padding: 14mm;
            max-width: 210mm;
            margin: 0 auto;
            border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .qr-sheet {
            position: relative;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-template-rows: repeat(2, 1fr);
            gap: 10mm 8mm;
        }
        .qr-sheet::before,
        .qr-sheet::after {
            content: "";
            position: absolute;
            z-index: 0;
            pointer-events: none;
            border-color: #9ca3af;
            border-style: dashed;
        }
        .qr-sheet::before {
            top: 0;
            bottom: 0;
            left: 50%;
            border-left-width: 1px;
        }
        .qr-sheet::after {
            left: 0;
            right: 0;
            top: 50%;
            border-top-width: 1px;
        }
        .qr-card {
            position: relative;
            z-index: 1;
            border: 1.5px dashed #9ca3af;
            padding: 8mm 7mm;
            text-align: center;
            min-height: 118mm;
            border-radius: 4px;
            background: white;
            box-sizing: border-box;
            break-inside: avoid;
        }
        .qr-name {
            font-size: 20px;
            font-weight: 900;
            color: #1f2937;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .qr-wp {
            font-size: 17px;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }
        .qr-img {
            width: 58mm;
            height: 58mm;
            display: block;
            margin: 0 auto;
        }
        .qr-code {
            font-size: 34px;
            font-weight: 900;
            color: #1f2937;
            margin-top: 9px;
        }
        .qr-type {
            font-size: 18px;
            font-weight: 900;
            color: #f97618; /* var(--primary) */
            text-transform: uppercase;
            margin-top: 4px;
        }
        .qr-problem {
            max-width: 78mm;
            margin: 7px auto 0;
            color: #374151;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.25;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .qr-problem-label {
            color: #6b7280;
            font-weight: 900;
        }
        .print-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 10px;
            background: #f97618;
            color: white;
            text-align: center;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        @media print {
            @page {
                size: A4 portrait;
                margin: 10mm;
            }
            body {
                background: white;
                padding: 0;
            }
            .page {
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 0;
                max-width: 100%;
            }
            .qr-sheet {
                gap: 8mm 7mm;
            }
            .qr-card {
                min-height: 133mm;
                padding: 8mm 6mm;
            }
            .print-btn {
                display: none;
            }
            .qr-name {
                font-size: 19px;
            }
            .qr-wp {
                font-size: 16px;
            }
            .qr-code {
                font-size: 32px;
            }
            .qr-type {
                font-size: 17px;
            }
            .qr-problem {
                font-size: 11.5px;
                max-width: 76mm;
            }
        }
    </style>
</head>
<body>

    <button class="print-btn" onclick="window.print()">🖨 Imprimir Ahora</button>

    <div class="page">
        <div class="qr-sheet">
            {% for copia in "1234" %}
            <div class="qr-card">
                <div class="qr-name">{{ cliente.nombres|truncatechars:25 }}</div>
                <div class="qr-wp">{{ cliente.whatsapp }}</div>
                <img src="{{ qr_data_uri }}" alt="QR {{ forloop.counter }}" class="qr-img">
                <div class="qr-code">{{ ingreso.codigo_equipo }}</div>
                <div class="qr-type">{{ ingreso.tipo_equipo_display }}</div>
                <div class="qr-problem">
                    <span class="qr-problem-label">Problema:</span>
                    {{ ingreso.problema_reportado|truncatechars:90 }}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        // Imprimir automáticamente al abrir la página
        window.onload = function() {
            setTimeout(function() {
                window.print();
            }, 500);
        };
    </script>
</body>
</html>
