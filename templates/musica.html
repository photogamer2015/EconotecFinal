{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconoPlayer - Música</title>
    <style>
        :root {
            --primary: #f97618;
            --bg: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --border-color: #374151;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 12px 0;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-container {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #d7642f;
        }
        .player-container {
            flex: 1;
            background: black;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .empty-state {
            color: #9ca3af;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h1 style="justify-content: center; font-size: 24px;">🎵 EconoPlayer</h1>
        <p style="color: #9ca3af; margin-bottom: 20px;">Busca y escucha música sin interrupciones.</p>
        
        <div class="search-container" style="max-width: 400px; margin: 0 auto; justify-content: center;">
            <input type="text" id="searchInput" placeholder="¿Qué quieres escuchar? (Ej. Salsa, Michael Jackson...)" autofocus>
            <button onclick="buscarMusica()">Buscar</button>
        </div>
    </div>

    <script>
        function buscarMusica() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            const encodedQuery = encodeURIComponent(query);
            // Redirigimos a YouTube Music para evitar bloqueos de copyright
            window.location.href = `https://music.youtube.com/search?q=${encodedQuery}`;
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscarMusica();
        });
    </script>
</body>
</html>
